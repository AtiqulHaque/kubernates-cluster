apiVersion: apps/v1
kind: Deployment
metadata:
  name: nestjs-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: nestjs
  template:
    metadata:
      labels:
        component: nestjs
    spec:
      containers:
        - name: nestjs
          image: atiqulhaque/multi-nest-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: '3001'
            - name: PGUSER
              value: postgres
            - name: PGHOST
              value: postgres-cluster-ip-service
            - name: PGPORT
              value: '5432'
            - name: PGDATABASE
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgpassword
                  key: PGPASSWORD
